<!DOCTYPE html>
<html>
<head>
    <base href="/devstack/">

    <meta charset="UTF-8">
    <meta content="IE=Edge" http-equiv="X-UA-Compatible">
    <meta name="description" content="A fork of DevToys written in Flutter">

    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="devtoys_flutter">
    <link rel="apple-touch-icon" href="icons/Icon-192.png">

    <link rel="icon" type="image/png" href="favicon.png"/>

    <title>devtoys_flutter</title>
    <link rel="manifest" href="manifest.json">

    <style>
        body {
          background-image: linear-gradient(45deg, #E6E1F2, #FAF7FF);
          margin: 0;
          padding: 0;
          height: 100vh;
          overflow: hidden;
        }

        @media (prefers-color-scheme: dark) {
          body {
            background-color: #1c1c1e; /* Dark mode background */
          }
        }

        #loading-indicator {
          position: absolute;
          top: 0; left: 0; right: 0; bottom: 0;
          display: flex;
          justify-content: center;
          align-items: center;
          z-index: 9999;
          transition: opacity 0.4s ease-out; /* Smooth fade out */
        }

        .loader {
          width: 44px;
          height: 44px;
          border: 4px solid rgba(0, 0, 0, 0.1);
          border-radius: 50%;
          border-left-color: #673ab7; /* Primary color */
          animation: spin 1s linear infinite;
        }

        @media (prefers-color-scheme: dark) {
          .loader {
            border-color: rgba(255, 255, 255, 0.1);
            border-left-color: #b39ddb; /* Vibrant blue for dark mode */
          }
        }

        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
<div id="loading-indicator">
    <div class="loader"></div>
</div>
<script src="flutter_bootstrap.js" async></script>

<script>
    // Flutter dispatches this event when the first frame is drawn
    window.addEventListener('flutter-first-frame', function () {
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        // Fade it out
        loader.style.opacity = '0';
        // Remove it from the DOM after the fade transition completes
        setTimeout(function() {
          loader.remove();
        }, 400);
      }
    });
</script>
</body>
</html>
