name: devstack
description: "A fork of DevToys written in Flutter"
publish_to: 'none'

version: 1.2.0+8

environment:
  sdk: ">=3.6.2 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  get: ^4.7.3
  get_it: ^9.2.1
  collection: ^1.19.0
  shared_preferences: ^2.5.3
  easy_localization: ^3.0.8
  flutter_keyboard_visibility: ^6.0.0
  flutter_dotenv: ^6.0.1
  package_info_plus: ^9.0.1
  gap: ^3.0.1
  path: ^1.9.1
  flutter_animate: ^4.5.2
  lottie: ^3.3.1
  flutter_svg: ^2.2.0
  cached_network_image: ^3.4.1
  yaml: ^3.1.3
  json2yaml: ^3.0.1
  crypto: ^3.0.7
  crclib: ^3.0.0
  pointycastle: ^4.0.0
  file_picker: ^11.0.2
  desktop_drop: ^0.7.1
  cross_file: ^0.3.5+2
  qr_flutter: ^4.1.0
  timezone: ^0.11.0
  google_fonts: ^6.2.1
  custom_sliding_segmented_control: ^1.8.5
  re_editor: ^0.8.0
  re_highlight: ^0.0.3
  device_info_plus: ^11.3.0
  flutter_js: ^0.8.7
  flutter_colorpicker: ^1.1.0
  url_launcher: ^6.3.2
  flutter_markdown_plus: ^1.0.7
  screenshot: ^3.0.0
  flutter_highlight: ^0.7.0
  overlay_support: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  msix: ^3.16.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  assets:
    - env/
    - assets/
    - assets/strings/
    - assets/icons/
    - assets/js/sql-formatter.min.js
    - assets/js/terser.min.js

msix_config:
  display_name: DevStack
  publisher_display_name: HK Tech Professional
  publisher: 'CN=BEE7168B-8EED-4646-8D6B-6AFFA4BCA664'
  identity_name: HKTechProfessional.DevStack
  version: 1.2.0
  logo_path: windows\runner\resources\app_icon.ico
  capabilities: internetClient
  store: true